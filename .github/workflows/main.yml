name: DevOps Firebase Test Lab CI

on:
  push:
    branches: [ "main" ]

jobs:
  test-lab:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download the code and APK from the GitHub repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Authenticate into Google Cloud/Firebase using our Secret Key
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Step 3: Setup Google Cloud CLI tools inside the GitHub Runner
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      # Step 4: Instruct Firebase to run an automated Robo Test on our APK
      - name: Run Firebase Robo Test
        run: |
          gcloud firebase test android run \
            --type robo \
            --app ./app.apk \
            --device model=SmallPhone.arm,version=34,locale=en,orientation=portrait \
            --timeout 60s
